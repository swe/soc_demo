name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  checks:
    name: Typecheck, lint, unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test -- tests/unit

  integration:
    name: Integration tests + migration check
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: soc
          POSTGRES_PASSWORD: soc
          POSTGRES_DB: soc_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U soc -d soc_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://soc:soc@localhost:5433/soc_test
      AUTH_SECRET: ci-only-secret-ci-only-secret-ci-only-secret
      AUTH_URL: http://localhost:3000
      APP_URL: http://localhost:3000
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Migrations apply cleanly from empty database
        run: pnpm db:migrate
      - name: Integration tests
        run: pnpm test -- tests/integration

  e2e:
    name: Playwright M1 acceptance
    runs-on: ubuntu-latest
    needs: [checks, integration]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: soc
          POSTGRES_PASSWORD: soc
          POSTGRES_DB: soc_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U soc -d soc_e2e"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://soc:soc@localhost:5432/soc_e2e
      AUTH_SECRET: ci-only-secret-ci-only-secret-ci-only-secret
      AUTH_URL: http://127.0.0.1:3100
      APP_URL: http://127.0.0.1:3100
      NODE_ENV: production
      E2E_PORT: "3100"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:migrate
      - run: pnpm build
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
