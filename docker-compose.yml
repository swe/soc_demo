services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: soc
      POSTGRES_PASSWORD: soc
      POSTGRES_DB: soc
    ports:
      - "5432:5432"
    volumes:
      - soc_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soc -d soc"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Isolated database for integration tests (kept small, no volume)
  postgres_test:
    image: postgres:16-alpine
    profiles: ["test"]
    environment:
      POSTGRES_USER: soc
      POSTGRES_PASSWORD: soc
      POSTGRES_DB: soc_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data

volumes:
  soc_pgdata:
